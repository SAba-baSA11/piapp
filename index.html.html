<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>π - შენი რიცხვი უსასრულობაში</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --neon-blue:#00f5ff;
  --neon-purple:#bf00ff;
  --neon-gold:#ffd700;
  --dark:#020010;
}
body{
  background:var(--dark);
  color:#fff;
  font-family:'Noto Sans Georgian',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;color:var(--neon-blue);font-family:'Orbitron',monospace;font-size:11px;opacity:0;animation:fall linear infinite;user-select:none;}
@keyframes fall{0%{opacity:0;transform:translateY(-20px);}10%{opacity:0.35;}90%{opacity:0.08;}100%{opacity:0;transform:translateY(100vh);}}
.screen{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;}
.screen.active{display:flex;}

/* SCREEN 1 */
.pi-hero{font-family:'Orbitron',sans-serif;font-size:clamp(90px,22vw,170px);font-weight:900;background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;filter:drop-shadow(0 0 30px rgba(0,245,255,0.5));animation:pulse-glow 3s ease-in-out infinite;margin-bottom:6px;}
@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 30px rgba(0,245,255,0.4));}50%{filter:drop-shadow(0 0 70px rgba(191,0,255,0.9));}}
.hero-sub{font-size:clamp(10px,2.5vw,13px);color:rgba(0,245,255,0.5);font-family:'Orbitron',monospace;letter-spacing:3px;text-align:center;margin-bottom:10px;}
.hero-tagline{font-size:clamp(13px,3.5vw,16px);color:rgba(255,255,255,0.6);text-align:center;margin-bottom:36px;line-height:1.6;max-width:340px;}
.hero-tagline span{color:var(--neon-gold);font-weight:600;}
.input-card{background:rgba(10,0,37,0.95);border:1px solid rgba(0,245,255,0.2);border-radius:20px;padding:clamp(22px,5vw,38px);width:100%;max-width:420px;box-shadow:0 0 50px rgba(0,245,255,0.08);}
.input-label{font-size:11px;color:rgba(0,245,255,0.7);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block;}
.input-hint{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:12px;display:block;line-height:1.5;}
.input-field{width:100%;background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.2);border-radius:10px;padding:13px 16px;color:#fff;font-family:'Noto Sans Georgian',sans-serif;font-size:16px;margin-bottom:20px;outline:none;transition:all 0.3s;}
.input-field:focus{border-color:var(--neon-blue);box-shadow:0 0 20px rgba(0,245,255,0.15);background:rgba(0,245,255,0.07);}
.input-field::placeholder{color:rgba(255,255,255,0.18);}
.digit-display{display:flex;gap:10px;justify-content:center;margin-bottom:20px;cursor:pointer;}
.digit-box{width:56px;height:64px;background:rgba(0,245,255,0.05);border:1px solid rgba(0,245,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:26px;font-weight:700;color:var(--neon-blue);transition:all 0.2s;}
.digit-box.filled{border-color:var(--neon-blue);box-shadow:0 0 15px rgba(0,245,255,0.3);background:rgba(0,245,255,0.1);}
.digit-box.active{border-color:var(--neon-purple);box-shadow:0 0 20px rgba(191,0,255,0.4);animation:blink-border 0.8s infinite;}
@keyframes blink-border{0%,100%{border-color:var(--neon-purple);}50%{border-color:rgba(191,0,255,0.2);}}
.hidden-input{position:absolute;opacity:0;width:1px;height:1px;}
.search-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));border:none;border-radius:10px;color:#000;font-family:'Noto Sans Georgian',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;opacity:0.35;pointer-events:none;}
.search-btn.ready{opacity:1;pointer-events:all;}
.search-btn.ready:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,245,255,0.35);}
.search-btn.ready:active{transform:translateY(0);}
.error-msg{color:#ff6b6b;font-size:13px;margin-top:12px;text-align:center;min-height:18px;}

/* SCREEN 2 */
.scanning-title{font-family:'Orbitron',sans-serif;font-size:clamp(14px,4vw,20px);color:var(--neon-blue);text-align:center;letter-spacing:3px;margin-bottom:8px;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.scanning-sub{font-size:clamp(12px,3vw,14px);color:rgba(255,255,255,0.35);text-align:center;margin-bottom:36px;line-height:1.6;}
.digit-rain-box{width:100%;max-width:480px;height:180px;overflow:hidden;border:1px solid rgba(0,245,255,0.12);border-radius:12px;background:rgba(0,0,0,0.6);position:relative;margin-bottom:28px;}
.digit-rain-inner{font-family:'Orbitron',monospace;font-size:12px;color:var(--neon-blue);word-break:break-all;padding:10px 12px;line-height:1.9;animation:scroll-digits 1.8s linear infinite;}
@keyframes scroll-digits{0%{transform:translateY(0);}100%{transform:translateY(-50%);}}
.target-flash{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--neon-gold);letter-spacing:8px;animation:target-pulse 0.6s ease-in-out infinite;}
@keyframes target-pulse{0%,100%{opacity:1;text-shadow:0 0 20px var(--neon-gold);}50%{opacity:0.2;text-shadow:none;}}
.progress-wrap{width:100%;max-width:480px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple));border-radius:2px;width:0%;transition:width 0.1s linear;}
.pos-counter{font-family:'Orbitron',monospace;font-size:clamp(11px,2.5vw,14px);color:rgba(0,245,255,0.4);letter-spacing:2px;}

/* SCREEN 3 */
.found-burst{font-family:'Orbitron',sans-serif;font-size:clamp(40px,13vw,88px);font-weight:900;background:linear-gradient(135deg,var(--neon-gold),#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 25px rgba(255,215,0,0.7));animation:found-pop 0.6s cubic-bezier(0.175,0.885,0.32,1.275);text-align:center;margin-bottom:16px;}
@keyframes found-pop{0%{transform:scale(0) rotate(-10deg);opacity:0;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
.found-desc{font-size:clamp(14px,4vw,20px);color:rgba(255,255,255,0.85);text-align:center;margin-bottom:28px;line-height:1.7;max-width:400px;}
.found-desc span{color:var(--neon-gold);font-weight:700;}
.digits-hl-box{background:rgba(0,0,0,0.55);border:1px solid rgba(0,245,255,0.18);border-radius:12px;padding:14px 18px;max-width:460px;width:100%;font-family:'Orbitron',monospace;font-size:clamp(11px,2.8vw,14px);color:rgba(0,245,255,0.45);word-break:break-all;line-height:2.1;margin-bottom:20px;text-align:center;letter-spacing:1px;}
.digits-hl-box .hl{background:var(--neon-gold);color:#000;padding:2px 5px;border-radius:4px;font-weight:700;font-size:clamp(12px,3vw,16px);}
.pos-badge{background:linear-gradient(135deg,rgba(0,245,255,0.08),rgba(191,0,255,0.08));border:1px solid rgba(0,245,255,0.25);border-radius:50px;padding:10px 28px;font-family:'Orbitron',monospace;font-size:clamp(12px,3vw,15px);color:var(--neon-blue);margin-bottom:28px;letter-spacing:2px;}
.cert-ready-wrap{text-align:center;margin-bottom:20px;}
.cert-ready-wrap p{font-size:clamp(13px,3.5vw,16px);color:rgba(255,255,255,0.65);line-height:1.7;margin-bottom:18px;}
.cert-btn{padding:15px 44px;background:linear-gradient(135deg,var(--neon-gold),#e67e00);border:none;border-radius:50px;color:#000;font-family:'Noto Sans Georgian',sans-serif;font-size:clamp(14px,3.5vw,17px);font-weight:700;cursor:pointer;transition:all 0.3s;animation:cert-pulse 2s ease-in-out infinite;}
@keyframes cert-pulse{0%,100%{box-shadow:0 0 35px rgba(255,215,0,0.35);}50%{box-shadow:0 0 60px rgba(255,215,0,0.65);}}
.cert-btn:hover{transform:scale(1.05);}
.back-btn{margin-top:16px;background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:50px;padding:10px 26px;color:rgba(255,255,255,0.35);font-family:'Noto Sans Georgian',sans-serif;font-size:13px;cursor:pointer;transition:all 0.3s;}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,0.5);}

/* CERT OVERLAY */
.cert-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,10,0.96);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.cert-overlay.active{display:flex;}
.cert-canvas-wrap{width:100%;max-width:700px;border-radius:10px;overflow:hidden;box-shadow:0 0 60px rgba(255,215,0,0.2);}
#certCanvas{width:100%;height:auto;display:block;}
.cert-actions{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;justify-content:center;}
.dl-btn{padding:13px 30px;background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));border:none;border-radius:50px;color:#000;font-family:'Noto Sans Georgian',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;}
.dl-btn:hover{transform:scale(1.05);}
.close-cert-btn{padding:13px 30px;background:transparent;border:1px solid rgba(255,255,255,0.25);border-radius:50px;color:rgba(255,255,255,0.55);font-family:'Noto Sans Georgian',sans-serif;font-size:15px;cursor:pointer;transition:all 0.3s;}
.close-cert-btn:hover{color:#fff;border-color:#fff;}
</style>
</head>
<body>
<div id="particles"></div>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <div class="pi-hero">π</div>
  <div class="hero-sub">3.14159265358979...</div>
  <div class="hero-tagline">შენი რიცხვი <span>ყოველთვის იმალებოდა</span><br>π-ის უსასრულო ციფრებში</div>
  <div class="input-card">
    <label class="input-label">შენი სახელი და გვარი</label>
    <input class="input-field" id="nameInput" type="text" placeholder="მაგ: ილია დვალიშვილი" autocomplete="off">
    <label class="input-label">4-ციფრიანი კომბინაცია</label>
    <span class="input-hint">დაბადების წელი · საიდუმლო კოდი · ნებისმიერი 4 ციფრი</span>
    <div class="digit-display" id="digitDisplay">
      <div class="digit-box active" id="db0">_</div>
      <div class="digit-box" id="db1">_</div>
      <div class="digit-box" id="db2">_</div>
      <div class="digit-box" id="db3">_</div>
    </div>
    <input class="hidden-input" id="numInput" type="tel" maxlength="4" inputmode="numeric" autocomplete="off">
    <button class="search-btn" id="searchBtn" onclick="startSearch()">π-ში ძიება</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <div class="scanning-title">სკანირება მიმდინარეობს...</div>
  <div class="scanning-sub">π-ის 100,000 ციფრს შორის<br>ვეძებთ შენს კომბინაციას</div>
  <div class="digit-rain-box">
    <div class="digit-rain-inner" id="digitRain"></div>
    <div class="target-flash" id="targetFlash"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="pos-counter" id="posCounter">პოზიცია: 0</div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen3">
  <div class="found-burst">ნაპოვნია!</div>
  <div class="found-desc" id="foundDesc"></div>
  <div class="digits-hl-box" id="hlBox"></div>
  <div class="pos-badge" id="posBadge"></div>
  <div class="cert-ready-wrap">
    <p>თქვენი სერტიფიკატი მზადაა<br>დააჭირეთ სანახავად 👇</p>
    <button class="cert-btn" onclick="showCert()">📜 სერტიფიკატის ნახვა</button>
  </div>
  <button class="back-btn" onclick="goBack()">← თავიდან დაწყება</button>
</div>

<!-- CERT OVERLAY -->
<div class="cert-overlay" id="certOverlay">
  <div class="cert-canvas-wrap">
    <canvas id="certCanvas"></canvas>
  </div>
  <div class="cert-actions">
    <button class="close-cert-btn" onclick="closeCert()">დახურვა</button>
  </div>
</div>

<script>
const PI_DIGITS = "3141592653589793238462643383279502884197169399375105820974944592307816406286208998628034825342117067982148086513282306647093844609550582231725359408128481117450284102701938521105559644622948954930381964428810975665933446128475648233786783165271201909145648566923460348610454326648213393607260249141273724587006606315588174881520920962829254091715364367892590360011330530548820466521384146951941511609433057270365759591953092186117381932611793105118548074462379962749567351885752724891227938183011949129833673362440656643086021394946395224737190702179860943702770539217176293176752384674818467669405132000568127145263560827785771342757789609173637178721468440901224953430146549585371050792279689258923542019956112129021960864034418159813629774771309960518707211349999998372978049951059731732816096318595024459455346908302642522308253344685035261931188171010003137838752886587533208381420617177669147303598253490428755468731159562863882353787593751957781857780532171226806613001927876611195909216420198938095257201065485863278865936153381827968230301952035301852968995773622599413891249721775283479131515574857242454150695950829533116861727855889075098381754637464939319255060400927701671139009848824012858361603563707660104710181942955596198946767837449448255379774726847104047534646208046684259069491293313677028989152104752162056966024058038150193511253382430035587640247496473263914199272604269922796782354781636009341721641219924586315030286182974555706749838505494588586926995690927210797509302955321165344987202755960236480665499119881834797753566369807426542527862551818417574672890977772793800081647060016145249192173217214772350141441973568548161361157352552133475741849468438523323907394143334547762416862518983569485562099219222184272550254256887671790494601653466804988627232791786085784383827967976681454100953883786360950680064225125205117392984896084128488626945604241965285022210661186306744278622039194945047123713786960956364371917287467764657573962413890865832645 // Confirmed pixel positions on 2000x1414 canvas:
// XXX  (digit combo): x=1100, y=557
// NAME              : x=958,  y=620
// YYY  (position)   : x=877,  y=682
const CERT_W = 2000, CERT_H = 1414;
const POS_XXX  = {x: 1100, y: 557};
const POS_NAME = {x: 958,  y: 620};
const POS_YYY  = {x: 877,  y: 682};

let userName = '', userNum = '', foundPos = -1, digitBuffer = '';

// Particles
(function(){
  const c = document.getElementById('particles');
  const chars = '31415926535897932384626433832795028841971693993751';
  for(let i=0;i<45;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=chars[Math.floor(Math.random()*chars.length)];
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*14}s;font-size:${9+Math.random()*7}px;`;
    c.appendChild(p);
  }
})();

// Digit box input
const numInput  = document.getElementById('numInput');
const searchBtn = document.getElementById('searchBtn');
document.getElementById('digitDisplay').addEventListener('click', ()=>numInput.focus());
numInput.addEventListener('input', function(){
  this.value = this.value.replace(/\D/g,'').slice(0,4);
  digitBuffer = this.value;
  updateBoxes();
});
numInput.addEventListener('keydown', e=>{ if(e.key==='Enter' && digitBuffer.length===4) startSearch(); });
setTimeout(()=>numInput.focus(), 300);

function updateBoxes(){
  for(let i=0;i<4;i++){
    const b=document.getElementById('db'+i);
    if(i<digitBuffer.length){b.textContent=digitBuffer[i];b.classList.add('filled');b.classList.remove('active');}
    else{b.textContent='_';b.classList.remove('filled');b.classList.toggle('active',i===digitBuffer.length);}
  }
  searchBtn.classList.toggle('ready', digitBuffer.length===4);
  if(digitBuffer.length===4) document.getElementById('db3').classList.remove('active');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goBack(){
  digitBuffer=''; numInput.value=''; updateBoxes();
  document.getElementById('nameInput').value='';
  document.getElementById('errorMsg').textContent='';
  showScreen('screen1');
  setTimeout(()=>numInput.focus(),300);
}

function startSearch(){
  const name = document.getElementById('nameInput').value.trim();
  const err  = document.getElementById('errorMsg');
  if(!name){ err.textContent='გთხოვ შეიყვანე შენი სახელი'; return; }
  if(digitBuffer.length!==4){ err.textContent='შეიყვანე ზუსტად 4 ციფრი'; return; }
  err.textContent='';
  userName  = name;
  userNum   = digitBuffer;
  foundPos  = PI_DIGITS.indexOf(userNum);
  showScreen('screen2');
  document.getElementById('targetFlash').textContent = userNum;
  // digit rain
  let txt='';
  for(let i=0;i<800;i++) txt+=PI_DIGITS[i%PI_DIGITS.length];
  document.getElementById('digitRain').textContent = txt+txt;
  // progress
  const fill=document.getElementById('progressFill');
  const counter=document.getElementById('posCounter');
  const duration=3200, start=Date.now();
  const displayTarget = foundPos>0 ? foundPos : 50000;
  const tick=setInterval(()=>{
    const pct=Math.min((Date.now()-start)/duration,1);
    const e=pct<0.85?pct/0.85:1;
    fill.style.width=(e*100)+'%';
    counter.textContent='პოზიცია: '+Math.floor(e*displayTarget).toLocaleString();
    if(pct>=1){
      clearInterval(tick);
      fill.style.width='100%';
      counter.textContent='პოზიცია: '+(foundPos+1).toLocaleString();
      setTimeout(showResult, 350);
    }
  },30);
}

function showResult(){
  showScreen('screen3');
  document.getElementById('foundDesc').innerHTML='<span>'+userName+'</span>, შენი კომბინაცია <span>'+userNum+'</span><br>თავიდანვე იმალებოდა π-ში!';
  const s=Math.max(0,foundPos-15), e=Math.min(PI_DIGITS.length,foundPos+userNum.length+15);
  document.getElementById('hlBox').innerHTML=
    '...'+PI_DIGITS.slice(s,foundPos)+'<span class="hl">'+PI_DIGITS.slice(foundPos,foundPos+userNum.length)+'</span>'+PI_DIGITS.slice(foundPos+userNum.length,e)+'...';
  document.getElementById('posBadge').textContent='📍 პოზიცია π-ში: '+(foundPos+1).toLocaleString();
}

function showCert(){
  document.getElementById('certOverlay').classList.add('active');
  renderCert();
}
function closeCert(){
  document.getElementById('certOverlay').classList.remove('active');
}

function renderCert(){
  const canvas=document.getElementById('certCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=CERT_W; canvas.height=CERT_H;
  const img=new Image();
  img.onload=function(){
    ctx.drawImage(img,0,0,CERT_W,CERT_H);
    const f=new FontFace('Noto Sans Georgian','url(https://fonts.gstatic.com/s/notosansgeorgian/v43/if2IHd9_enzmXbs4WBj9KcSI5E1fkIuHKiMGBBDiSMA.woff2)');
    f.load().then(loaded=>{
      document.fonts.add(loaded);
      drawText(ctx);
    }).catch(()=>drawText(ctx));
  };
  img.src=CERT_IMG;
}

function drawText(ctx){
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.font='bold 52px "Noto Sans Georgian", sans-serif';
  ctx.fillStyle='#1a0a2e';
  ctx.fillText(userNum, POS_XXX.x, POS_XXX.y);
  let nameFontSize=46;
  ctx.font='bold '+nameFontSize+'px "Noto Sans Georgian", sans-serif';
  while(ctx.measureText(userName).width > 420 && nameFontSize > 28){
    nameFontSize-=2;
    ctx.font='bold '+nameFontSize+'px "Noto Sans Georgian", sans-serif';
  }
  ctx.fillStyle='#1a0a2e';
  ctx.fillText(userName, POS_NAME.x, POS_NAME.y);
  ctx.font='bold 52px "Noto Sans Georgian", sans-serif';
  ctx.fillStyle='#cc4400';
  ctx.fillText((foundPos+1).toLocaleString(), POS_YYY.x, POS_YYY.y);
}
